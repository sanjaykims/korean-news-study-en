name: Split subdirectory into new repo

# Triggers two ways:
#   - Manually from the Actions tab (workflow_dispatch, with editable inputs)
#   - Automatically when the `.split-trigger` file changes on main
#     (uses the hardcoded defaults below)

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch in THIS repo to filter"
        required: true
        default: "claude/remarkable-productivity-app-GimWA"
      subdirectory:
        description: "Subdirectory to extract (becomes the new repo root)"
        required: true
        default: "remarkable-app"
      destination_repo:
        description: "Destination repo as owner/name (must already exist and be empty)"
        required: true
        default: "sanjaykims/remarkable-feed"
      destination_branch:
        description: "Branch name to create in the destination"
        required: true
        default: "main"
  push:
    branches: [main]
    paths:
      - ".split-trigger"

jobs:
  split:
    runs-on: ubuntu-latest
    env:
      SOURCE_BRANCH: ${{ github.event.inputs.source_branch || 'claude/remarkable-productivity-app-GimWA' }}
      SUBDIRECTORY: ${{ github.event.inputs.subdirectory || 'remarkable-app' }}
      DEST_REPO: ${{ github.event.inputs.destination_repo || 'sanjaykims/remarkable-feed' }}
      DEST_BRANCH: ${{ github.event.inputs.destination_branch || 'main' }}
    steps:
      - name: Check token
        env:
          TOKEN: ${{ secrets.SPLIT_PUSH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::Secret SPLIT_PUSH_TOKEN is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout source with full history
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 0

      - name: Verify subdirectory exists
        run: |
          if [ ! -d "${SUBDIRECTORY}" ]; then
            echo "::error::Subdirectory '${SUBDIRECTORY}' does not exist on '${SOURCE_BRANCH}'."
            exit 1
          fi

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Configure git identity
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "github-actions"

      - name: Filter history to subdirectory
        run: git filter-repo --subdirectory-filter "${SUBDIRECTORY}" --force

      - name: Push to destination repo
        env:
          TOKEN: ${{ secrets.SPLIT_PUSH_TOKEN }}
        run: |
          git remote add origin "https://x-access-token:${TOKEN}@github.com/${DEST_REPO}.git"
          git branch -M "${DEST_BRANCH}"
          git push -u origin "${DEST_BRANCH}"
          echo "✓ Pushed to https://github.com/${DEST_REPO} on branch ${DEST_BRANCH}"
