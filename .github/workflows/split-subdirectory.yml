name: Split subdirectory into new repo

# Triggers two ways:
#   - Manually from the Actions tab (workflow_dispatch, with editable inputs)
#   - Automatically when the `.split-trigger` file changes on main
#     (uses the hardcoded defaults below)

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch in THIS repo to filter"
        required: true
        default: "claude/remarkable-productivity-app-GimWA"
      subdirectory:
        description: "Subdirectory to extract (becomes the new repo root)"
        required: true
        default: "remarkable-app"
      destination_repo:
        description: "Destination repo as owner/name (must already exist and be empty)"
        required: true
        default: "sanjaykims/remarkable-feed"
      destination_branch:
        description: "Branch name to create in the destination"
        required: true
        default: "main"
  push:
    branches: [main]
    paths:
      - ".split-trigger"

jobs:
  split:
    runs-on: ubuntu-latest
    env:
      SOURCE_BRANCH: ${{ github.event.inputs.source_branch || 'claude/remarkable-productivity-app-GimWA' }}
      SUBDIRECTORY: ${{ github.event.inputs.subdirectory || 'remarkable-app' }}
      DEST_REPO: ${{ github.event.inputs.destination_repo || 'sanjaykims/remarkable-feed' }}
      DEST_BRANCH: ${{ github.event.inputs.destination_branch || 'main' }}
    steps:
      - name: Check token
        env:
          TOKEN: ${{ secrets.SPLIT_PUSH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::Secret SPLIT_PUSH_TOKEN is not set."
            echo "Add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Diagnose token access to destination
        env:
          TOKEN: ${{ secrets.SPLIT_PUSH_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/resp.json -w '%{http_code}' \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${DEST_REPO}")
          echo "GitHub API GET /repos/${DEST_REPO} -> HTTP ${code}"
          case "$code" in
            200)
              echo "Token can SEE the destination repo. Checking write permission..."
              perm=$(grep -oE '"push":[[:space:]]*(true|false)' /tmp/resp.json | head -1)
              echo "  ${perm:-(push permission not reported)}"
              if echo "$perm" | grep -q 'true'; then
                echo "OK: token has push (write) access."
              else
                echo "::error::Token can READ ${DEST_REPO} but CANNOT push. Grant 'Contents: Read and write' (fine-grained token) or the 'repo' scope (classic token), then update the SPLIT_PUSH_TOKEN secret."
                exit 1
              fi
              ;;
            401)
              echo "::error::HTTP 401 - the token is invalid or expired. Generate a NEW token and update the SPLIT_PUSH_TOKEN secret with the new value (no spaces/newlines)."
              exit 1
              ;;
            403)
              echo "::error::HTTP 403 - token rejected (SSO not authorized, or rate limited)."
              exit 1
              ;;
            404)
              echo "::error::HTTP 404 - the token cannot access ${DEST_REPO}. This private repo is invisible to the token. Use a CLASSIC token with the 'repo' scope, or a fine-grained token whose Repository access includes ${DEST_REPO}. Then update the SPLIT_PUSH_TOKEN secret."
              exit 1
              ;;
            *)
              echo "::error::Unexpected HTTP ${code} from GitHub API."
              cat /tmp/resp.json || true
              exit 1
              ;;
          esac

      - name: Checkout source with full history
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 0
          # Do NOT persist the workflow GITHUB_TOKEN into git config.
          # It is scoped to this repo only and would otherwise be sent as an
          # auth header on the push to the destination repo, causing a
          # misleading "Repository not found" error.
          persist-credentials: false

      - name: Verify subdirectory exists
        run: |
          if [ ! -d "${SUBDIRECTORY}" ]; then
            echo "::error::Subdirectory '${SUBDIRECTORY}' does not exist on '${SOURCE_BRANCH}'."
            exit 1
          fi

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Configure git identity
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "github-actions"

      - name: Filter history to subdirectory
        run: git filter-repo --subdirectory-filter "${SUBDIRECTORY}" --force

      - name: Push to destination repo
        env:
          TOKEN: ${{ secrets.SPLIT_PUSH_TOKEN }}
        run: |
          # Belt-and-suspenders: drop any persisted auth header in case it exists.
          git config --unset-all http."https://github.com/".extraheader || true
          git remote add origin "https://x-access-token:${TOKEN}@github.com/${DEST_REPO}.git"
          git branch -M "${DEST_BRANCH}"
          git push -u origin "${DEST_BRANCH}"
          echo "Pushed to https://github.com/${DEST_REPO} on branch ${DEST_BRANCH}"
